<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;

    background: #f4f6f9;

    color: #333;
  }

  .app {
    display: flex;

    flex-direction: column;

    min-height: 100vh;
  }

  .header {
    background: #1565c0;

    color: #fff;

    padding: 18px;

    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
  }

  .title {
    font-size: 20px;

    font-weight: bold;

    letter-spacing: 0.5px;
  }

  .subtitle {
    margin-top: 4px;

    font-size: 12px;

    opacity: 0.9;
  }

  .stepBar {
    display: flex;

    justify-content: space-between;

    background: #fff;

    border-bottom: 1px solid #d9d9d9;

    padding: 14px 8px;
  }

  .step {
    flex: 1;

    text-align: center;
  }

  .circle {
    width: 30px;

    height: 30px;

    margin: auto;

    border-radius: 50%;

    background: #cfcfcf;

    color: #fff;

    display: flex;

    align-items: center;

    justify-content: center;

    font-weight: bold;
  }

  .step.active .circle {
    background: #1565c0;
  }

  .label {
    margin-top: 6px;

    font-size: 11px;
  }

  .content {
    flex: 1;

    overflow: auto;

    padding: 18px;
  }

  .card {
    background: #fff;

    border-radius: 8px;

    margin-bottom: 18px;

    padding: 18px;

    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
  }

  .card h2 {
    color: #1565c0;

    font-size: 14px;

    margin-bottom: 6px;
  }

  .card h3 {
    font-size: 18px;

    margin-bottom: 12px;
  }

  textarea {
    width: 100%;

    min-height: 180px;

    resize: vertical;

    padding: 12px;

    border: 1px solid #cfcfcf;

    border-radius: 6px;

    font-size: 13px;

    font-family: Consolas, monospace;

    margin-bottom: 14px;
  }

  #promptBox {
    background: #fcfcfc;
  }

  #responseBox {
    background: #fffdf5;
  }

  pre {
    background: #f7f7f7;

    border: 1px solid #ddd;

    border-radius: 6px;

    padding: 12px;

    min-height: 180px;

    overflow: auto;

    white-space: pre-wrap;

    font-size: 12px;
  }

  button {
    width: 100%;

    border: none;

    padding: 12px;

    border-radius: 6px;

    font-size: 14px;

    cursor: pointer;

    transition: 0.2s;
  }

  .primary {
    background: #1565c0;

    color: #fff;
  }

  .primary:hover {
    background: #0d47a1;
  }

  .secondary {
    background: #455a64;

    color: #fff;
  }

  .secondary:hover {
    background: #37474f;
  }

  .success {
    background: #2e7d32;

    color: #fff;
  }

  .success:hover {
    background: #1b5e20;
  }

  .statusBar {
    background: #fff;

    border-top: 1px solid #ddd;

    padding: 12px 18px;

    font-size: 13px;

    position: sticky;

    bottom: 0;
  }

  #statusText {
    color: #1565c0;

    font-weight: bold;
  }

  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-thumb {
    background: #bdbdbd;

    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #9e9e9e;
  }
</style>
