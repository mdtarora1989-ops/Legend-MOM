<!doctype html>
<html>
  <head>
    <base target="_top" />

    <?!= include('AIWorkspaceCSS'); ?>
  </head>

  <body>
    <div class="app">
      <!-- HEADER -->

      <div class="header">
        <div class="title">LEGEND AI WORKSPACE</div>

        <div class="subtitle">Intelligent Meeting Management Platform</div>
      </div>

      <!-- STEP BAR -->

      <div class="stepBar">
        <div class="step active">
          <div class="circle">1</div>

          <div class="label">Notes</div>
        </div>

        <div class="step">
          <div class="circle">2</div>

          <div class="label">Prompt</div>
        </div>

        <div class="step">
          <div class="circle">3</div>

          <div class="label">AI Reply</div>
        </div>

        <div class="step">
          <div class="circle">4</div>

          <div class="label">Preview</div>
        </div>

        <div class="step">
          <div class="circle">5</div>

          <div class="label">Insert</div>
        </div>
      </div>

      <!-- CONTENT -->

      <div class="content">
        <!-- STEP 1 -->

        <div class="card">
          <h2>Step 1</h2>

          <h3>Meeting Notes</h3>

          <textarea
            id="notes"
            placeholder="Paste meeting notes here..."
          ></textarea>

          <button class="primary" onclick="generatePrompt()">
            Generate AI Prompt
          </button>
        </div>

        <!-- STEP 2 -->

        <div class="card" id="promptCard" style="display: none">
          <h2>Step 2</h2>

          <h3>Generated Prompt</h3>

          <textarea id="promptBox" readonly></textarea>

          <button class="secondary" onclick="copyPrompt()">Copy Prompt</button>
        </div>

        <!-- STEP 3 -->

        <div class="card" id="responseCard" style="display: none">
          <h2>Step 3</h2>

          <h3>Paste ChatGPT Response</h3>

          <textarea
            id="responseBox"
            placeholder="Paste ChatGPT JSON here..."
          ></textarea>

          <button class="primary" onclick="validateResponse()">
            Validate Response
          </button>
        </div>

        <!-- STEP 4 -->

        <div class="card" id="previewCard" style="display: none">
          <h2>Step 4</h2>

          <h3>Preview</h3>

          <pre id="previewArea"></pre>

          <button class="success" onclick="insertResponse()">
            Insert into MOM
          </button>
        </div>
      </div>

      <!-- STATUS -->

      <div class="statusBar">
        <strong>Status :</strong>

        <span id="statusText"> Ready </span>
      </div>
    </div>

    <?!= include('AIWorkspaceJS'); ?>
  </body>
</html>
