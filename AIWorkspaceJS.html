<script>

function setStatus(text){

document.getElementById("statusText").innerHTML=text;

}

function generatePrompt(){

setStatus("Generating Prompt...");

const notes=document.getElementById("notes").value;

google.script.run

.withSuccessHandler(function(prompt){

document.getElementById("promptPanel").style.display="block";

document.getElementById("responsePanel").style.display="block";

document.getElementById("promptBox").value=prompt;

setStatus("Prompt Ready");

})

.generatePrompt(notes);

}

function copyPrompt(){

const box=document.getElementById("promptBox");

box.select();

document.execCommand("copy");

setStatus("Prompt Copied");

}

function validateResponse(){

const response=document.getElementById("responseBox").value;

google.script.run

.withSuccessHandler(function(result){

document.getElementById("previewPanel").style.display="block";

document.getElementById("previewArea").textContent=result.preview;

setStatus(result.message);

})

.withFailureHandler(function(err){

alert(err.message);

setStatus("Validation Failed");

})

.validateAIResponse(response);

}

function insertResponse(){

google.script.run

.insertValidatedResponse();

setStatus("Inserted");

}

</script>
