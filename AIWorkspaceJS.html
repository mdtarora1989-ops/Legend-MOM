<script>
  function setStatus(text) {
    document.getElementById("statusText").innerHTML = text;
  }

  function generatePrompt() {
    setStatus("Generating Prompt...");

    const notes = document.getElementById("notes").value;

    google.script.run

      .withSuccessHandler(function (prompt) {
        document.getElementById("promptPanel").style.display = "block";

        document.getElementById("promptBox").value = prompt;

        setStatus("Prompt Ready");
      })

      .withFailureHandler(function (err) {
        setStatus(err.message);
      })

      .generatePrompt(notes);
  }

  function copyPrompt() {
    const box = document.getElementById("promptBox");

    box.select();

    document.execCommand("copy");

    setStatus("Prompt Copied");
  }
</script>
