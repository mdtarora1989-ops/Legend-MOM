<script>
  let generatedPrompt = "";
  let validatedJSON = null;
  let lastImageAIText = null;
  let lastImageOcrText = null;

  /*************************************************
   * Status
   *************************************************/
  function setStatus(message) {
    document.getElementById("statusText").textContent = message;
  }

  /*************************************************
   * AI Provider Selector
   *************************************************/
  function switchAIProvider() {
    const provider = document.getElementById("aiProviderSelector").value;
    google.script.run
      .withSuccessHandler(function () {
        setStatus("AI Provider switched to: " + provider);
      })
      .withFailureHandler(function (err) {
        alert("Failed to switch provider: " + err.message);
      })
      .setAIProvider(provider);
  }

  function loadAIProvider() {
    google.script.run
      .withSuccessHandler(function (provider) {
        document.getElementById("aiProviderSelector").value = provider;
      })
      .getAIProvider();
  }

  /*************************************************
   * OCR Method Selector
   *************************************************/
  function switchOCRMethod() {
    const method = document.getElementById("ocrMethodSelector").value;
    google.script.run
      .withSuccessHandler(function () {
        setStatus("OCR Method switched to: " + method);
      })
      .withFailureHandler(function (err) {
        alert("Failed to switch OCR method: " + err.message);
      })
      .setOCRMethod(method);
  }

  function loadOCRMethod() {
    google.script.run
      .withSuccessHandler(function (method) {
        document.getElementById("ocrMethodSelector").value = method;
      })
      .getOCRMethod();
  }

  /*************************************************
   * Common OCR Error Fixes
   *************************************************/
  function fixCommonOcrErrors(text) {
    text = text.replace(/\|/g, 'l');           // | -> l
    text = text.replace(/\b0+\b/g, 'O');      // standalone 0 -> O
    text = text.replace(/S([A-Z])/g, '5$1');  // S followed by uppercase -> 5
    text = text.replace(/rn/g, 'm');          // rn -> m
    text = text.replace(/\s+/g, ' ');         // multiple spaces -> single space
    text = text.replace(/([a-z])([A-Z])/g, '$1 $2'); // missing space between words
    return text;
  }

  /*************************************************
   * Generate Prompt
   *************************************************/
  function generatePrompt() {
    const notes = document.getElementById("notes").value.trim();

    if (notes === "") {
      alert("Please enter meeting notes.");
      return;
    }

    setStatus("Generating AI Prompt...");

    google.script.run
      .withSuccessHandler(function (prompt) {
        generatedPrompt = prompt;
        document.getElementById("promptBox").value = prompt;
        document.getElementById("promptCard").style.display = "block";
        document.getElementById("responseCard").style.display = "block";
        setStatus("Prompt Ready");
      })
      .withFailureHandler(function (error) {
        setStatus("Failed");
        alert(error.message);
      })
      .generatePrompt(notes);
  }

  /*************************************************
   * Auto Generate & Insert (one-click flow)
   *************************************************/
  function autoGenerateAndInsert() {
    const notes = document.getElementById("notes").value.trim();
    if (notes === "") {
      alert("Please enter meeting notes.");
      return;
    }

    setStatus("Calling AI...");

    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.success) {
          alert("Meeting Created: " + res.meetingCode);
          setStatus("Completed");
          resetWorkspace();
        } else {
          alert("Failed: " + (res && res.message ? res.message : 'Unknown'));
          setStatus("Failed");
        }
      })
      .withFailureHandler(function (err) {
        alert("Failed: " + err.message);
        setStatus("Failed");
      })
      .generateAndInsertFromNotes(notes);
  }

  /*************************************************
   * Copy Prompt
   *************************************************/
  function copyPrompt() {
    if (generatedPrompt === "") {
      alert("Generate prompt first.");
      return;
    }

    navigator.clipboard.writeText(generatedPrompt);
    setStatus("Prompt copied to clipboard.");
  }

  /*************************************************
   * Validate JSON
   *************************************************/
  function validateResponse() {
    const response = document.getElementById("responseBox").value.trim();

    if (response === "") {
      alert("Paste ChatGPT response first.");
      return;
    }

    setStatus("Validating...");

    google.script.run
      .withSuccessHandler(function (result) {
        if (!result.success) {
          alert(result.message);
          setStatus("Validation Failed");
          return;
        }

        validatedJSON = result.data;
        document.getElementById("previewCard").style.display = "block";
        document.getElementById("previewArea").textContent = JSON.stringify(
          result.data,
          null,
          2,
        );
        setStatus("JSON Valid");
      })
      .withFailureHandler(function (err) {
        alert(err.message);
        setStatus("Validation Failed");
      })
      .validateAIResponse(response);
  }

  /*************************************************
   * Insert
   *************************************************/
  function insertResponse() {
    if (validatedJSON == null) {
      alert("Validate response first.");
      return;
    }

    setStatus("Inserting...");

    google.script.run
      .withSuccessHandler(function (result) {
        if (result.success) {
          alert("Meeting Created\n\n" + "Meeting Code : " + result.meetingCode);
          setStatus("Completed");
          resetWorkspace();
        } else {
          alert(result.message);
          setStatus("Insert Failed");
        }
      })
      .withFailureHandler(function (err) {
        alert(err.message);
        setStatus("Insert Failed");
      })
      .insertValidatedResponse(JSON.stringify(validatedJSON));
  }

  /*************************************************
   * IMAGE UPLOAD HANDLERS (Multi-page support)
   *************************************************/
  function processImageUpload() {
    const input = document.getElementById('imageFile');
    if (!input || !input.files || input.files.length === 0) {
      alert('Please select one or more image files.');
      return;
    }

    const files = Array.from(input.files);
    setStatus('Processing ' + files.length + ' image(s) for OCR...');

    let allBase64 = [];
    let filesProcessed = 0;

    files.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = function (e) {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        allBase64.push({ base64: base64, name: file.name, index: idx });
        filesProcessed++;

        if (filesProcessed === files.length) {
          processMultipleImages(allBase64);
        }
      };
      reader.readAsDataURL(file);
    });
  }

  function processMultipleImages(imageList) {
    setStatus('Uploading and processing ' + imageList.length + ' image(s)...');

    google.script.run
      .withSuccessHandler(onImageProcessResult)
      .withFailureHandler(function (err) {
        if (err.message && err.message.includes('rate limit')) {
          setStatus('Server rate limited. Using client-side OCR...');
          processTesseractFallback(imageList);
        } else {
          alert('Image processing failed: ' + err.message);
          setStatus('Failed');
        }
      })
      .processMultipleImagesBase64(imageList);
  }

  function onImageProcessResult(result) {
    if (!result) {
      alert('No result returned from image processing.');
      setStatus('Failed');
      return;
    }
    
    lastImageOcrText = result.ocrText || '';
    document.getElementById('ocrText').textContent = result.ocrText || '';
    document.getElementById('ocrSource').textContent = 'OCR source: ' + (result.ocrSource || 'unknown');

    var cleanOcrText = (result.ocrText || '').replace(/---PAGE \d+---/g, '\n').trim();
    cleanOcrText = fixCommonOcrErrors(cleanOcrText);
    document.getElementById('notes').value = cleanOcrText;

    if (result.aiJson) {
      document.getElementById('previewCard').style.display = 'block';
      document.getElementById('previewArea').textContent = JSON.stringify(result.aiJson, null, 2);
    }
    lastImageAIText = result.aiText || null;
    setStatus('OCR loaded and cleaned. Ready to review and generate prompt.');
  }

  async function processTesseractFallback(imageList) {
    try {
      const { createWorker } = Tesseract;
      const worker = await createWorker('eng');
      let combinedOcrText = '';

      for (const img of imageList) {
        setStatus('OCR page ' + (img.index + 1) + ' of ' + imageList.length + '...');
        const result = await worker.recognize('data:image/png;base64,' + img.base64);
        combinedOcrText += result.data.text + '\n---PAGE BREAK---\n';
      }

      await worker.terminate();

      lastImageOcrText = combinedOcrText;
      document.getElementById('ocrText').textContent = combinedOcrText;
      document.getElementById('ocrSource').textContent = 'OCR source: tesseract.js (client-side)';

      var cleanOcrText = combinedOcrText.replace(/---PAGE BREAK---/g, '\n').trim();
      cleanOcrText = fixCommonOcrErrors(cleanOcrText);
      document.getElementById('notes').value = cleanOcrText;
      
      setStatus('OCR loaded and cleaned. Ready to review and generate prompt.');
    } catch (err) {
      alert('Tesseract OCR failed: ' + err.message);
      setStatus('Failed');
    }
  }

  function insertImageAI() {
    if (!lastImageAIText) {
      alert('No AI data to insert. Process image(s) first and generate AI prompt.');
      return;
    }
    setStatus('Inserting AI result...');
    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.success) {
          alert('Meeting Created: ' + res.meetingCode);
          setStatus('Completed');
          resetWorkspace();
        } else {
          alert('Insert failed: ' + (res && res.message ? res.message : 'Unknown'));
          setStatus('Insert Failed');
        }
      })
      .withFailureHandler(function (err) {
        alert('Insert failed: ' + err.message);
        setStatus('Insert Failed');
      })
      .insertValidatedResponse(lastImageAIText);
  }

  /*************************************************
   * Reset
   *************************************************/
  function resetWorkspace() {
    generatedPrompt = "";
    validatedJSON = null;
    lastImageAIText = null;
    lastImageOcrText = null;

    document.getElementById("notes").value = "";
    document.getElementById("promptBox").value = "";
    document.getElementById("responseBox").value = "";
    document.getElementById("previewArea").textContent = "";
    document.getElementById("ocrText").textContent = "";
    document.getElementById("ocrSource").textContent = "";
    document.getElementById("imageFile").value = "";

    document.getElementById("promptCard").style.display = "none";
    document.getElementById("responseCard").style.display = "none";
    document.getElementById("previewCard").style.display = "none";
    document.getElementById('insertImageBtn').disabled = true;

    setStatus("Ready");
  }

  /*************************************************
   * Initialize on sidebar load
   *************************************************/
  document.addEventListener('DOMContentLoaded', function() {
    loadAIProvider();
    loadOCRMethod();
  });
</script>
