<script>
  let generatedPrompt = "";
  let validatedJSON = null;

  /*************************************************
   * Status
   *************************************************/
  function setStatus(message) {
    document.getElementById("statusText").textContent = message;
  }

  /*************************************************
   * Generate Prompt
   *************************************************/
  function generatePrompt() {
    const notes = document.getElementById("notes").value.trim();

    if (notes === "") {
      alert("Please enter meeting notes.");

      return;
    }

    setStatus("Generating AI Prompt...");

    google.script.run

      .withSuccessHandler(function (prompt) {
        generatedPrompt = prompt;

        document.getElementById("promptBox").value = prompt;

        document.getElementById("promptCard").style.display = "block";

        document.getElementById("responseCard").style.display = "block";

        setStatus("Prompt Ready");
      })

      .withFailureHandler(function (error) {
        setStatus("Failed");

        alert(error.message);
      })

      .generatePrompt(notes);
  }

  /*************************************************
   * Copy Prompt
   *************************************************/
  function copyPrompt() {
    if (generatedPrompt === "") {
      alert("Generate prompt first.");

      return;
    }

    navigator.clipboard.writeText(generatedPrompt);

    setStatus("Prompt copied to clipboard.");
  }

  /*************************************************
   * Validate JSON
   *************************************************/
  function validateResponse() {
    const response = document.getElementById("responseBox").value.trim();

    if (response === "") {
      alert("Paste ChatGPT response first.");

      return;
    }

    setStatus("Validating...");

    google.script.run

      .withSuccessHandler(function (result) {
        if (!result.success) {
          alert(result.message);

          setStatus("Validation Failed");

          return;
        }

        validatedJSON = result.data;

        document.getElementById("previewCard").style.display = "block";

        document.getElementById("previewArea").textContent = JSON.stringify(
          result.data,
          null,
          2,
        );

        setStatus("JSON Valid");
      })

      .withFailureHandler(function (err) {
        alert(err.message);

        setStatus("Validation Failed");
      })

      .validateAIResponse(response);
  }

  /*************************************************
   * Insert
   *************************************************/
  function insertResponse() {
    if (validatedJSON == null) {
      alert("Validate response first.");

      return;
    }

    setStatus("Inserting...");

    google.script.run

      .withSuccessHandler(function (result) {
        if (result.success) {
          alert("Meeting Created\n\n" + "Meeting Code : " + result.meetingCode);

          setStatus("Completed");

          resetWorkspace();
        } else {
          alert(result.message);

          setStatus("Insert Failed");
        }
      })

      .withFailureHandler(function (err) {
        alert(err.message);

        setStatus("Insert Failed");
      })

      .insertValidatedResponse(JSON.stringify(validatedJSON));
  }

  /*************************************************
   * Reset
   *************************************************/
  function resetWorkspace() {
    generatedPrompt = "";

    validatedJSON = null;

    document.getElementById("notes").value = "";

    document.getElementById("promptBox").value = "";

    document.getElementById("responseBox").value = "";

    document.getElementById("previewArea").textContent = "";

    document.getElementById("promptCard").style.display = "none";

    document.getElementById("responseCard").style.display = "none";

    document.getElementById("previewCard").style.display = "none";

    setStatus("Ready");
  }
</script>
