<script>
  let generatedPrompt = "";
  let validatedJSON = null;
  let lastImageAIText = null;

  /*************************************************
   * Status
   *************************************************/
  function setStatus(message) {
    document.getElementById("statusText").textContent = message;
  }

  /*************************************************
   * Generate Prompt
   *************************************************/
  function generatePrompt() {
    const notes = document.getElementById("notes").value.trim();

    if (notes === "") {
      alert("Please enter meeting notes.");

      return;
    }

    setStatus("Generating AI Prompt...");

    google.script.run

      .withSuccessHandler(function (prompt) {
        generatedPrompt = prompt;

        document.getElementById("promptBox").value = prompt;

        document.getElementById("promptCard").style.display = "block";

        document.getElementById("responseCard").style.display = "block";

        setStatus("Prompt Ready");
      })

      .withFailureHandler(function (error) {
        setStatus("Failed");

        alert(error.message);
      })

      .generatePrompt(notes);
  }

  /*************************************************
   * Auto Generate & Insert (one-click flow)
   *************************************************/
  function autoGenerateAndInsert() {
    const notes = document.getElementById("notes").value.trim();
    if (notes === "") {
      alert("Please enter meeting notes.");
      return;
    }

    setStatus("Calling AI...");

    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.success) {
          alert("Meeting Created: " + res.meetingCode);
          setStatus("Completed");
          resetWorkspace();
        } else {
          alert("Failed: " + (res && res.message ? res.message : 'Unknown'));
          setStatus("Failed");
        }
      })
      .withFailureHandler(function (err) {
        alert("Failed: " + err.message);
        setStatus("Failed");
      })
      .generateAndInsertFromNotes(notes);
  }

  /*************************************************
   * Copy Prompt
   *************************************************/
  function copyPrompt() {
    if (generatedPrompt === "") {
      alert("Generate prompt first.");

      return;
    }

    navigator.clipboard.writeText(generatedPrompt);

    setStatus("Prompt copied to clipboard.");
  }

  /*************************************************
   * Validate JSON
   *************************************************/
  function validateResponse() {
    const response = document.getElementById("responseBox").value.trim();

    if (response === "") {
      alert("Paste ChatGPT response first.");

      return;
    }

    setStatus("Validating...");

    google.script.run

      .withSuccessHandler(function (result) {
        if (!result.success) {
          alert(result.message);

          setStatus("Validation Failed");

          return;
        }

        validatedJSON = result.data;

        document.getElementById("previewCard").style.display = "block";

        document.getElementById("previewArea").textContent = JSON.stringify(
          result.data,
          null,
          2,
        );

        setStatus("JSON Valid");
      })

      .withFailureHandler(function (err) {
        alert(err.message);

        setStatus("Validation Failed");
      })

      .validateAIResponse(response);
  }

  /*************************************************
   * Insert
   *************************************************/
  function insertResponse() {
    if (validatedJSON == null) {
      alert("Validate response first.");

      return;
    }

    setStatus("Inserting...");

    google.script.run

      .withSuccessHandler(function (result) {
        if (result.success) {
          alert("Meeting Created\n\n" + "Meeting Code : " + result.meetingCode);

          setStatus("Completed");

          resetWorkspace();
        } else {
          alert(result.message);

          setStatus("Insert Failed");
        }
      })

      .withFailureHandler(function (err) {
        alert(err.message);

        setStatus("Insert Failed");
      })

      .insertValidatedResponse(JSON.stringify(validatedJSON));
  }

  /*************************************************
   * IMAGE UPLOAD HANDLERS
   *************************************************/
  function processImageUpload() {
    const input = document.getElementById('imageFile');
    if (!input || !input.files || input.files.length === 0) {
      alert('Please select an image file first.');
      return;
    }
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function (e) {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      const mimeType = file.type || (dataUrl.split(',')[0].match(/data:([^;]+)/) || [])[1] || 'image/png';
      setStatus('Uploading image for OCR...');
      google.script.run
        .withSuccessHandler(onImageProcessResult)
        .withFailureHandler(function (err) {
          alert('Image processing failed: ' + err.message);
          setStatus('Failed');
        })
        .processImageBase64(base64, file.name, mimeType);
    };
    reader.readAsDataURL(file);
  }

  function onImageProcessResult(result) {
    // result: { ocrText, aiText, aiJson }
    if (!result) {
      alert('No result returned from image processing.');
      setStatus('Failed');
      return;
    }
    document.getElementById('ocrText').textContent = result.ocrText || '';
    if (result.aiJson) {
      document.getElementById('previewCard').style.display = 'block';
      document.getElementById('previewArea').textContent = JSON.stringify(result.aiJson, null, 2);
    }
    lastImageAIText = result.aiText || null;
    // enable insert button if we have aiText
    document.getElementById('insertImageBtn').disabled = !lastImageAIText;
    setStatus('Image processed (' + (result.ocrSource || 'unknown') + ' OCR)');
  }

  function insertImageAI() {
    if (!lastImageAIText) {
      alert('No AI data to insert. Process an image first.');
      return;
    }
    setStatus('Inserting AI result...');
    google.script.run
      .withSuccessHandler(function (res) {
        if (res && res.success) {
          alert('Meeting Created: ' + res.meetingCode);
          setStatus('Completed');
          resetWorkspace();
        } else {
          alert('Insert failed: ' + (res && res.message ? res.message : 'Unknown'));
          setStatus('Insert Failed');
        }
      })
      .withFailureHandler(function (err) {
        alert('Insert failed: ' + err.message);
        setStatus('Insert Failed');
      })
      .insertValidatedResponse(lastImageAIText);
  }

  /*************************************************
   * Reset
   *************************************************/
  function resetWorkspace() {
    generatedPrompt = "";

    validatedJSON = null;

    lastImageAIText = null;

    document.getElementById("notes").value = "";

    document.getElementById("promptBox").value = "";

    document.getElementById("responseBox").value = "";

    document.getElementById("previewArea").textContent = "";

    document.getElementById("ocrText").textContent = "";

    document.getElementById("promptCard").style.display = "none";

    document.getElementById("responseCard").style.display = "none";

    document.getElementById("previewCard").style.display = "none";

    document.getElementById('insertImageBtn').disabled = true;

    setStatus("Ready");
  }
</script>
